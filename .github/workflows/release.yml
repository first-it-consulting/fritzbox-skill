name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: bash test.sh

    - name: Get version
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Update version in _meta.json
      run: |
        python3 -c "
        import json
        with open('_meta.json') as f:
            meta = json.load(f)
        meta['version'] = '${{ steps.get_version.outputs.version }}'
        with open('_meta.json', 'w') as f:
            json.dump(meta, f, indent=2)
            f.write('\n')
        "
        cat _meta.json

    - name: Build skill package
      run: python3 scripts/package-skill.py . fritzbox.skill

    - name: List build output
      run: ls -lh fritzbox.skill

    - name: Generate release notes
      id: release_notes
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        NOTES=$(awk "/## \[$VERSION\]/{flag=1;next}/## \[/{flag=0}flag" CHANGELOG.md | head -50 | sed '/^$/d')
        if [ -z "$NOTES" ]; then
          NOTES="Release $VERSION"
        fi
        {
          echo "notes<<EOF"
          echo "$NOTES"
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: v${{ steps.get_version.outputs.version }}
        body: ${{ steps.release_notes.outputs.notes }}
        files: fritzbox.skill
        draft: false
        prerelease: false
